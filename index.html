<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* ======================= */
/* BASE */
/* ======================= */

body{
margin:0;
font-family:Segoe UI,Roboto,Arial;
background:#f4f6fb;
color:#333;
display:flex;
}

/* ======================= */
/* SIDEBAR */
/* ======================= */

.sidebar{

width:230px;
background:#1e3a8a;
color:white;
min-height:100vh;
padding:30px 20px;

box-shadow:4px 0 20px rgba(0,0,0,0.1);

}

.sidebar h2{

margin-top:0;
font-size:22px;
text-align:center;

}

.sidebar p{

font-size:13px;
opacity:.8;
text-align:center;

}

/* ======================= */
/* MAIN */
/* ======================= */

.main{

flex:1;
padding:25px;

}

/* ======================= */
/* HEADER */
/* ======================= */

header{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:25px;

}

header h1{
margin:0;
font-size:24px;
}

/* ======================= */
/* CARDS */
/* ======================= */

.cards{

display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:25px;

}

.card{

flex:1;
min-width:220px;

background:white;
padding:25px;

border-radius:10px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

text-align:center;

transition:.2s;

}

.card:hover{

transform:translateY(-5px);

}

.card h2{

font-size:36px;
margin:0;
color:#2563eb;

}

/* ======================= */
/* FILTROS */
/* ======================= */

.filters{

display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;

}

.filters input,
.filters select{

padding:10px;
border-radius:8px;
border:1px solid #ddd;

}

.filters button{

padding:10px 16px;
border:none;
border-radius:8px;

background:#2563eb;
color:white;
font-weight:bold;

cursor:pointer;

}

/* ======================= */
/* TABELA */
/* ======================= */

.table-card{

background:white;

border-radius:10px;

padding:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

margin-bottom:30px;

}

table{

width:100%;
border-collapse:collapse;

}

th{

background:#f1f5f9;
padding:12px;
text-align:left;

}

td{

padding:12px;
border-bottom:1px solid #eee;

}

tr:hover{

background:#f9fafb;

}

/* ======================= */
/* BADGES */
/* ======================= */

.badge{

padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;

}

.cargo{

background:#22c55e;
color:white;

}

.substituicao{

background:#f97316;
color:white;

}

/* ======================= */
/* RANKING */
/* ======================= */

.rank-card{

background:white;

border-radius:10px;

padding:15px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

/* ======================= */
/* MOBILE */
/* ======================= */

@media(max-width:900px){

body{
flex-direction:column;
}

.sidebar{
width:100%;
min-height:auto;
text-align:center;
}

.cards{
flex-direction:column;
}

.filters{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="sidebar">

<h2>📊 Painel</h2>
<p>Vagas Matemática</p>

</div>

<div class="main">

<header>

<h1>🎓 Painel de Vagas de Matemática</h1>
<p>Rede Estadual de Minas Gerais</p>

</header>

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total de vagas</p>
</div>

<div class="card">
<h2 id="cargo">0</h2>
<p>Cargo Vago</p>
</div>

<div class="card">
<h2 id="sub">0</h2>
<p>Substituição</p>
</div>

</div>

<div class="filters">

<input type="text" id="busca" placeholder="Buscar escola">

<select id="turno">
<option value="todos">Todos turnos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
</select>

<select id="natureza">
<option value="todos">Todas naturezas</option>
<option value="Cargo Vago">Cargo Vago</option>
<option value="Substituição">Substituição</option>
</select>

<button onclick="exportar()">Exportar Excel</button>

</div>

<div class="table-card">

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

</div>

<h2>🏆 Ranking de escolas com mais vagas</h2>

<div class="rank-card">

<table id="ranking">

<tr>
<th>Escola</th>
<th>Total</th>
</tr>

</table>

</div>

</div>

<script>

let dados=[]
let dadosFiltrados=[]

async function carregar(){

let resp=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let buffer=await resp.arrayBuffer()

let workbook=XLSX.read(buffer)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dados.push({
escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]
})

}

filtrar()

}

function filtrar(){

let busca=document.getElementById("busca").value.toLowerCase()
let turno=document.getElementById("turno").value
let natureza=document.getElementById("natureza").value

let total=0
let cargo=0
let sub=0

let contagem={}
let ranking={}

dadosFiltrados=[]

for(let d of dados){

if(busca && !d.escola.toLowerCase().includes(busca)) continue
if(turno!="todos" && d.turno!=turno) continue
if(natureza!="todos" && d.natureza!=natureza) continue

dadosFiltrados.push(d)

total++

if(d.natureza=="Cargo Vago") cargo++
if(d.natureza=="Substituição") sub++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0
contagem[chave]++

if(!ranking[d.escola]) ranking[d.escola]=0
ranking[d.escola]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Vagas</th></tr>"

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`
<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>
`

}

let rankingTabela=document.getElementById("ranking")

rankingTabela.innerHTML="<tr><th>Escola</th><th>Total</th></tr>"

let ordem=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

for(let r of ordem.slice(0,10)){

rankingTabela.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
</tr>
`

}

}

function exportar(){

let ws=XLSX.utils.json_to_sheet(dadosFiltrados)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"resultado")

XLSX.writeFile(wb,"vagas_filtradas.xlsx")

}

document.getElementById("busca").oninput=filtrar
document.getElementById("turno").onchange=filtrar
document.getElementById("natureza").onchange=filtrar

carregar()

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* BASE */

body{
margin:0;
font-family:Segoe UI, Arial;
background:#f3f3f3;
color:#333;
}

/* HEADER */

header{
background:white;
padding:20px 30px;
border-bottom:1px solid #ddd;
}

header h1{
margin:0;
font-size:24px;
font-weight:600;
}

/* CONTAINER */

.container{
padding:25px;
max-width:1400px;
margin:auto;
}

/* CHIPS SUPERIORES */

.chips{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:25px;
}

.chip{
padding:8px 14px;
border-radius:20px;
border:1px solid #ccc;
background:white;
font-size:13px;
}

/* GRID PRINCIPAL */

.dashboard{

display:grid;
grid-template-columns:260px 260px 1fr;
gap:20px;

}

/* CARDS */

.card{

background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

.big-number{

font-size:60px;
font-weight:500;
text-align:center;

}

.card-title{

font-size:14px;
color:#666;
margin-bottom:10px;

}

/* FILTROS */

.filter-box{

background:white;
border-radius:8px;
padding:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;

}

.filter-box h3{

margin-top:0;
font-size:14px;
margin-bottom:10px;

}

.filter-box input,
.filter-box select{

width:100%;
padding:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:6px;

}

.filter-box button{

width:100%;
padding:8px;
background:#2a8bdc;
border:none;
color:white;
border-radius:6px;
cursor:pointer;

}

/* TABELA */

.table-card{

background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);

}

table{

width:100%;
border-collapse:collapse;

}

th{

text-align:left;
padding:10px;
border-bottom:2px solid #ddd;

}

td{

padding:10px;
border-bottom:1px solid #eee;

}

tr:hover{
background:#f9f9f9;
}

/* BADGES */

.badge{

padding:4px 10px;
border-radius:20px;
font-size:12px;

}

.cargo{

background:#27ae60;
color:white;

}

.substituicao{

background:#f39c12;
color:white;

}

/* RESPONSIVO */

@media(max-width:1000px){

.dashboard{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<h1>Previsão de Vagas por Município</h1>

</header>

<div class="container">

<!-- CHIPS SUPERIORES -->

<div class="chips">

<div class="chip">PEB REGULAR</div>
<div class="chip">PEB EDUCAÇÃO ESPECIAL</div>
<div class="chip">ASSISTENTE SOCIAL</div>
<div class="chip">PSICÓLOGOS</div>
<div class="chip">ASSISTENTE TÉCNICO</div>
<div class="chip">ANALISTA EDUCACIONAL</div>
<div class="chip">INSPETOR ESCOLAR</div>
<div class="chip">TÉCNICO DA EDUCAÇÃO</div>

</div>

<div class="dashboard">

<!-- COLUNA 1 -->

<div>

<div class="card">

<div class="card-title">Quantitativo de vagas</div>

<div class="big-number" id="total">0</div>

</div>

<div class="filter-box">

<h3>Buscar Escola</h3>

<input type="text" id="busca" placeholder="Nome da escola">

</div>

</div>

<!-- COLUNA 2 -->

<div>

<div class="filter-box">

<h3>Turno</h3>

<select id="turno">

<option value="todos">Todos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>

</select>

</div>

<div class="filter-box">

<h3>Natureza</h3>

<select id="natureza">

<option value="todos">Todos</option>
<option value="Cargo Vago">Cargo Vago</option>
<option value="Substituição">Substituição</option>

</select>

</div>

<div class="filter-box">

<button onclick="exportar()">Exportar Excel</button>

</div>

</div>

<!-- COLUNA 3 -->

<div class="table-card">

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

<br>

<h3>Ranking de escolas</h3>

<table id="ranking">

<tr>
<th>Escola</th>
<th>Total</th>
</tr>

</table>

</div>

</div>

</div>

<script>

let dados=[]
let dadosFiltrados=[]

async function carregar(){

let resp=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let buffer=await resp.arrayBuffer()

let workbook=XLSX.read(buffer)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dados.push({
escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]
})

}

filtrar()

}

function filtrar(){

let busca=document.getElementById("busca").value.toLowerCase()
let turno=document.getElementById("turno").value
let natureza=document.getElementById("natureza").value

let total=0
let contagem={}
let ranking={}

dadosFiltrados=[]

for(let d of dados){

if(busca && !d.escola.toLowerCase().includes(busca)) continue
if(turno!="todos" && d.turno!=turno) continue
if(natureza!="todos" && d.natureza!=natureza) continue

dadosFiltrados.push(d)

total++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0
contagem[chave]++

if(!ranking[d.escola]) ranking[d.escola]=0
ranking[d.escola]++

}

document.getElementById("total").innerText=total

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Vagas</th></tr>"

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`

<tr>

<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>

</tr>

`

}

let rankingTabela=document.getElementById("ranking")

rankingTabela.innerHTML="<tr><th>Escola</th><th>Total</th></tr>"

let ordem=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

for(let r of ordem.slice(0,10)){

rankingTabela.innerHTML+=`

<tr>

<td>${r[0]}</td>
<td>${r[1]}</td>

</tr>

`

}

}

function exportar(){

let ws=XLSX.utils.json_to_sheet(dadosFiltrados)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"resultado")

XLSX.writeFile(wb,"vagas_filtradas.xlsx")

}

document.getElementById("busca").oninput=filtrar
document.getElementById("turno").onchange=filtrar
document.getElementById("natureza").onchange=filtrar

carregar()

</script>

</body>

</html>

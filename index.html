<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Consulta de Vagas - Matemática MG</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:40px;
}

h2{
margin-bottom:20px;
}

select{
padding:8px;
font-size:16px;
}

button{
padding:8px 12px;
font-size:16px;
}

table{
margin-top:20px;
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#f0f0f0;
}

</style>

</head>

<body>

<h2>Consulta de vagas de Matemática</h2>

<label>Turno:</label>

<select id="turno">

<option value="todos">Todos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>

</select>

<button onclick="buscar()">Buscar</button>

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Quantidade de vagas</th>
</tr>

</table>

<script>

async function buscar(){

let turnoEscolhido=document.getElementById("turno").value

let resposta=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let dados=await resposta.arrayBuffer()

let workbook=XLSX.read(dados)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

let contagem={}

for(let i=1;i<linhas.length;i++){

let linha=linhas[i]

let escola=linha[1]
let turno=linha[3]
let natureza=linha[4]

if(turnoEscolhido=="todos" || turno==turnoEscolhido){

let chave=escola+"|"+turno+"|"+natureza

if(!contagem[chave]){
contagem[chave]=0
}

contagem[chave]++

}

}

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Quantidade de vagas</th></tr>"

for(let chave in contagem){

let partes=chave.split("|")

let escola=partes[0]
let turno=partes[1]
let natureza=partes[2]

tabela.innerHTML+=`

<tr>
<td>${escola}</td>
<td>${turno}</td>
<td>${natureza}</td>
<td>${contagem[chave]}</td>
</tr>

`

}

}

</script>

</body>
</html>

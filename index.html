<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas - Matemática MG</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
min-width:200px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
margin:0;
font-size:28px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.filters input, .filters select{
padding:10px;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

.badge{
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.cargo{
background:#27ae60;
}

.substituicao{
background:#e67e22;
}

.rank{
margin-top:30px;
}

.progress{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>Painel de Vagas de Matemática</h1>
<p>Consulta interativa de vagas</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3 id="total">0</h3>
<p>Total de vagas</p>
</div>

<div class="card">
<h3 id="cargo">0</h3>
<p>Cargo Vago</p>
</div>

<div class="card">
<h3 id="sub">0</h3>
<p>Substituição</p>
</div>

</div>

<div class="filters">

<input type="text" id="busca" placeholder="Buscar escola">

<select id="turno">

<option value="todos">Todos os turnos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>

</select>

<select id="natureza">

<option value="todos">Todas naturezas</option>
<option value="Cargo Vago">Cargo Vago</option>
<option value="Substituição">Substituição</option>

</select>

</div>

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

<div class="rank">

<h2>Ranking de escolas com mais vagas</h2>

<table id="ranking">

<tr>
<th>Escola</th>
<th>Total</th>
</tr>

</table>

</div>

<div class="progress">

<h3>Gamificação</h3>

<p id="conquista">Explorador de vagas 🏆</p>

</div>

</div>

<script>

let dadosGlobais=[]

async function carregar(){

let resposta=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let dados=await resposta.arrayBuffer()

let workbook=XLSX.read(dados)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dadosGlobais.push({

escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]

})

}

filtrar()

}

function filtrar(){

let busca=document.getElementById("busca").value.toLowerCase()

let turno=document.getElementById("turno").value

let natureza=document.getElementById("natureza").value

let contagem={}
let ranking={}
let total=0
let cargo=0
let sub=0

for(let d of dadosGlobais){

if(busca && !d.escola.toLowerCase().includes(busca)) continue
if(turno!="todos" && d.turno!=turno) continue
if(natureza!="todos" && d.natureza!=natureza) continue

total++

if(d.natureza=="Cargo Vago") cargo++
if(d.natureza=="Substituição") sub++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0

contagem[chave]++

if(!ranking[d.escola]) ranking[d.escola]=0

ranking[d.escola]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Vagas</th></tr>"

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`

<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>

`

}

let rankingTabela=document.getElementById("ranking")

rankingTabela.innerHTML="<tr><th>Escola</th><th>Total</th></tr>"

let ordem=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

for(let r of ordem.slice(0,10)){

rankingTabela.innerHTML+=`

<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
</tr>

`

}

if(total>20){

document.getElementById("conquista").innerText="Mestre das vagas 🏆"

}

}

document.getElementById("busca").oninput=filtrar
document.getElementById("turno").onchange=filtrar
document.getElementById("natureza").onchange=filtrar

carregar()

</script>

</body>

</html>

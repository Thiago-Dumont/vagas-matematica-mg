<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática MG</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:system-ui,Arial;
margin:0;
background:#f4f6f9;
}

/* POPUP GAMEFICADO */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.popup-box{
background:white;
padding:40px;
border-radius:14px;
text-align:center;
max-width:420px;
width:90%;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
animation:scalein 0.4s;
}

@keyframes scalein{
from{transform:scale(0.7)}
to{transform:scale(1)}
}

.popup-box h2{
margin-top:0;
font-size:28px;
}

.popup-box p{
font-size:16px;
}

.popup-box button{
margin-top:20px;
padding:12px 25px;
font-size:16px;
background:#1f3c88;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.popup-box button:hover{
background:#162d63;
}

/* CABEÇALHO */

header{
background:#1f3c88;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* CARDS */

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
min-width:200px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
font-size:30px;
}

/* FILTROS */

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.filters input, .filters select{
padding:10px;
font-size:16px;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

/* BADGES */

.badge{
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.cargo{
background:#27ae60;
}

.substituicao{
background:#e67e22;
}

.rank{
margin-top:30px;
}

</style>

</head>

<body>

<!-- POPUP -->

<div id="popup">

<div class="popup-box">

<h2>🎉 Parabéns!!!</h2>

<p>Você desbloqueou o <b>Painel de Vagas de Matemática</b>.</p>

<p>Explore as vagas e complete sua missão.</p>

<button onclick="fecharPopup()">Começar missão</button>

</div>

</div>

<header>

<h1>Painel de Vagas de Matemática</h1>
<p>Rede Estadual de Minas Gerais</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total de vagas</p>
</div>

<div class="card">
<h2 id="cargo">0</h2>
<p>Cargo Vago</p>
</div>

<div class="card">
<h2 id="sub">0</h2>
<p>Substituição</p>
</div>

</div>

<div class="filters">

<input type="text" id="busca" placeholder="Buscar escola">

<select id="turno">

<option value="todos">Todos os turnos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>

</select>

<select id="natureza">

<option value="todos">Todas naturezas</option>
<option value="Cargo Vago">Cargo Vago</option>
<option value="Substituição">Substituição</option>

</select>

</div>

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

<div class="rank">

<h2>Ranking de escolas com mais vagas</h2>

<table id="ranking">

<tr>
<th>Escola</th>
<th>Total</th>
</tr>

</table>

</div>

</div>

<script>

function fecharPopup(){
document.getElementById("popup").style.display="none"
}

let dados=[]

async function carregar(){

let resp=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let buffer=await resp.arrayBuffer()

let workbook=XLSX.read(buffer)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dados.push({
escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]
})

}

filtrar()

}

function filtrar(){

let busca=document.getElementById("busca").value.toLowerCase()

let turno=document.getElementById("turno").value

let natureza=document.getElementById("natureza").value

let total=0
let cargo=0
let sub=0

let contagem={}
let ranking={}

for(let d of dados){

if(busca && !d.escola.toLowerCase().includes(busca)) continue
if(turno!="todos" && d.turno!=turno) continue
if(natureza!="todos" && d.natureza!=natureza) continue

total++

if(d.natureza=="Cargo Vago") cargo++
if(d.natureza=="Substituição") sub++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0

contagem[chave]++

if(!ranking[d.escola]) ranking[d.escola]=0

ranking[d.escola]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Vagas</th></tr>"

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`

<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>

`

}

let rankingTabela=document.getElementById("ranking")

rankingTabela.innerHTML="<tr><th>Escola</th><th>Total</th></tr>"

let ordem=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

for(let r of ordem.slice(0,10)){

rankingTabela.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
</tr>
`

}

}

document.getElementById("busca").oninput=filtrar
document.getElementById("turno").onchange=filtrar
document.getElementById("natureza").onchange=filtrar

carregar()

</script>

</body>

</html>

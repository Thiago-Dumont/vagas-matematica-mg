<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática MG</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

:root{
--roxo:#6c2bd9;
--azul:#2563eb;
--verde:#22c55e;
--laranja:#f97316;
}

/* FUNDO GAMIFICADO */

body{
font-family:system-ui;
margin:0;
background:linear-gradient(135deg,var(--roxo),var(--azul));
min-height:100vh;
color:white;
}

/* HEADER */

header{
text-align:center;
padding:30px;
}

header h1{
margin:0;
font-size:30px;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* CARDS */

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
min-width:200px;
padding:25px;
border-radius:16px;
color:white;
font-weight:bold;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card:nth-child(1){
background:linear-gradient(45deg,#6366f1,#8b5cf6);
}

.card:nth-child(2){
background:linear-gradient(45deg,#22c55e,#4ade80);
}

.card:nth-child(3){
background:linear-gradient(45deg,#f97316,#fb923c);
}

.card h2{
font-size:36px;
margin:0;
}

/* FILTROS */

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.filters input,
.filters select,
.filters button{
padding:10px;
font-size:16px;
border-radius:10px;
border:none;
}

.filters button{
background:var(--roxo);
color:white;
cursor:pointer;
}

/* TABELA */

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:12px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
}

th{
background:#f3f4f6;
}

/* BADGES */

.badge{
padding:5px 12px;
border-radius:20px;
font-size:12px;
color:white;
font-weight:bold;
}

.cargo{
background:var(--verde);
}

.substituicao{
background:var(--laranja);
}

/* RANKING */

.rank{
margin-top:30px;
}

.rank h2{
color:white;
}

</style>

</head>

<body>

<header>

<h1>🎓 Painel de Vagas de Matemática</h1>
<p>Rede Estadual de Minas Gerais</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total de vagas</p>
</div>

<div class="card">
<h2 id="cargo">0</h2>
<p>Cargo Vago</p>
</div>

<div class="card">
<h2 id="sub">0</h2>
<p>Substituição</p>
</div>

</div>

<div class="filters">

<input type="text" id="busca" placeholder="Buscar escola">

<select id="turno">
<option value="todos">Todos turnos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
</select>

<select id="natureza">
<option value="todos">Todas naturezas</option>
<option value="Cargo Vago">Cargo Vago</option>
<option value="Substituição">Substituição</option>
</select>

<button onclick="exportar()">Exportar Excel</button>

</div>

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

<div class="rank">

<h2>🏆 Ranking de escolas com mais vagas</h2>

<table id="ranking">

<tr>
<th>Escola</th>
<th>Total</th>
</tr>

</table>

</div>

</div>

<script>

let dados=[]
let dadosFiltrados=[]

async function carregar(){

let resp=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let buffer=await resp.arrayBuffer()

let workbook=XLSX.read(buffer)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dados.push({
escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]
})

}

filtrar()

}

function filtrar(){

let busca=document.getElementById("busca").value.toLowerCase()
let turno=document.getElementById("turno").value
let natureza=document.getElementById("natureza").value

let total=0
let cargo=0
let sub=0

let contagem={}
let ranking={}

dadosFiltrados=[]

for(let d of dados){

if(busca && !d.escola.toLowerCase().includes(busca)) continue
if(turno!="todos" && d.turno!=turno) continue
if(natureza!="todos" && d.natureza!=natureza) continue

dadosFiltrados.push(d)

total++

if(d.natureza=="Cargo Vago") cargo++
if(d.natureza=="Substituição") sub++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0
contagem[chave]++

if(!ranking[d.escola]) ranking[d.escola]=0
ranking[d.escola]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Vagas</th></tr>"

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`
<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>
`

}

let rankingTabela=document.getElementById("ranking")

rankingTabela.innerHTML="<tr><th>Escola</th><th>Total</th></tr>"

let ordem=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

for(let r of ordem.slice(0,10)){

rankingTabela.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
</tr>
`

}

}

function exportar(){

let ws=XLSX.utils.json_to_sheet(dadosFiltrados)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"resultado")

XLSX.writeFile(wb,"vagas_filtradas.xlsx")

}

document.getElementById("busca").oninput=filtrar
document.getElementById("turno").onchange=filtrar
document.getElementById("natureza").onchange=filtrar

carregar()

</script>

</body>

</html>

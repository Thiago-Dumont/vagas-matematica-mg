<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
min-width:200px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.badge{
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.cargo{
background:#27ae60;
}

.substituicao{
background:#e67e22;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

#map{
height:500px;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>Painel de Vagas de Matemática</h1>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total de vagas</p>
</div>

<div class="card">
<h2 id="cargo">0</h2>
<p>Cargo Vago</p>
</div>

<div class="card">
<h2 id="sub">0</h2>
<p>Substituição</p>
</div>

</div>

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

<h2>Mapa das escolas</h2>

<div id="map"></div>

</div>

<script>

let dados=[]

let mapa=L.map('map').setView([-19.92,-44.05],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa)

async function carregar(){

let respExcel=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let dadosExcel=await respExcel.arrayBuffer()

let workbook=XLSX.read(dadosExcel)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

let total=0
let cargo=0
let sub=0

let contagem={}

for(let i=1;i<linhas.length;i++){

let escola=linhas[i][1]
let turno=linhas[i][3]
let natureza=linhas[i][4]

total++

if(natureza=="Cargo Vago") cargo++
if(natureza=="Substituição") sub++

let chave=escola+"|"+turno+"|"+natureza

if(!contagem[chave]) contagem[chave]=0

contagem[chave]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.getElementById("tabela")

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`

<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>

`

await localizarEscola(p[0],contagem[chave])

}

}

async function localizarEscola(nome,vagas){

let url=`https://nominatim.openstreetmap.org/search?format=json&q=${nome}+Minas+Gerais`

let resp=await fetch(url)

let dados=await resp.json()

if(dados.length>0){

let lat=dados[0].lat
let lon=dados[0].lon

L.marker([lat,lon]).addTo(mapa)
.bindPopup(`<b>${nome}</b><br>${vagas} vagas`)

}

}

carregar()

</script>

</body>

</html>

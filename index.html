<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

/* ======================= */
/* BASE */
/* ======================= */

body{
margin:0;
font-family:'Segoe UI',Roboto,Arial;
background:#eef2f7;
color:#1f2937;
}

/* ======================= */
/* HEADER */
/* ======================= */

header{
text-align:center;
padding:25px;
background:#0f2a44;
color:white;
box-shadow:0 4px 20px rgba(0,0,0,0.15);
}

header h1{
margin:0;
font-size:28px;
}

header p{
opacity:.8;
}

/* ======================= */
/* CONTAINER */
/* ======================= */

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

/* ======================= */
/* CARDS SUPERIORES */
/* ======================= */

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.card{

flex:1;
min-width:220px;

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

text-align:center;

border-left:6px solid #1e4f75;

transition:.25s;

}

.card:hover{

transform:translateY(-4px);

box-shadow:0 20px 35px rgba(0,0,0,0.12);

}

.card h2{

font-size:36px;
margin:0;
color:#1e4f75;

}

/* ======================= */
/* FILTROS */
/* ======================= */

.filters{

display:flex;
flex-wrap:wrap;
gap:12px;
margin-bottom:25px;

}

.filters input,
.filters select{

padding:11px;

border-radius:8px;

border:1px solid #d1d5db;

background:white;

font-size:14px;

}

.filters button{

padding:11px 18px;

border-radius:8px;

border:none;

background:#f59e0b;

color:white;

font-weight:600;

cursor:pointer;

}

/* ======================= */
/* TABELA */
/* ======================= */

.table-card{

padding:5px;

}

/* TABELA */

table{

width:100%;

border-collapse:separate;

border-spacing:0 12px;

}

/* CABEÇALHO */

th{

text-align:left;

padding:12px;

color:#374151;

font-weight:600;

}

/* LINHAS */

tbody tr{

background:white;

box-shadow:0 8px 18px rgba(0,0,0,0.08);

transition:.2s;

}

/* BORDAS ARREDONDADAS */

tbody tr td:first-child{

border-radius:10px 0 0 10px;

}

tbody tr td:last-child{

border-radius:0 10px 10px 0;

}

/* CÉLULAS */

td{

padding:14px;

}

/* HOVER */

tbody tr:hover{

transform:scale(1.01);

box-shadow:0 12px 25px rgba(0,0,0,0.12);

}

/* ======================= */
/* BADGES */
/* ======================= */

.badge{

padding:6px 14px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}

.cargo{

background:#16a34a;
color:white;

}

.substituicao{

background:#f59e0b;
color:white;

}

/* ======================= */
/* RANKING */
/* ======================= */

.rank{

margin-top:40px;

}

.rank-card{

background:white;

border-radius:12px;

padding:15px;

box-shadow:0 10px 30px rgba(0,0,0,0.08);

}

/* ======================= */
/* MOBILE */
/* ======================= */

@media(max-width:700px){

.cards{
flex-direction:column;
}

.filters{
flex-direction:column;
}

}

</style>

</head>

<body>

<header>

<h1>🎓 Painel de Vagas de Matemática</h1>
<p>Rede Estadual de Minas Gerais</p>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2 id="total">0</h2>
<p>Total de vagas</p>
</div>

<div class="card">
<h2 id="cargo">0</h2>
<p>Cargo Vago</p>
</div>

<div class="card">
<h2 id="sub">0</h2>
<p>Substituição</p>
</div>

</div>

<div class="filters">

<input type="text" id="busca" placeholder="Buscar escola">

<select id="turno">
<option value="todos">Todos turnos</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
<option value="Noite">Noite</option>
</select>

<select id="natureza">
<option value="todos">Todas naturezas</option>
<option value="Cargo Vago">Cargo Vago</option>
<option value="Substituição">Substituição</option>
</select>

<button onclick="exportar()">Exportar Excel</button>

</div>

<div class="table-card">

<table id="tabela">

<thead>

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<div class="rank">

<h2>🏆 Ranking de escolas com mais vagas</h2>

<div class="rank-card">

<table id="ranking">

<tr>
<th>Escola</th>
<th>Total</th>
</tr>

</table>

</div>

</div>

</div>

<script>

let dados=[]
let dadosFiltrados=[]

async function carregar(){

let resp=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let buffer=await resp.arrayBuffer()

let workbook=XLSX.read(buffer)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dados.push({
escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]
})

}

filtrar()

}

function filtrar(){

let busca=document.getElementById("busca").value.toLowerCase()
let turno=document.getElementById("turno").value
let natureza=document.getElementById("natureza").value

let total=0
let cargo=0
let sub=0

let contagem={}
let ranking={}

dadosFiltrados=[]

for(let d of dados){

if(busca && !d.escola.toLowerCase().includes(busca)) continue
if(turno!="todos" && d.turno!=turno) continue
if(natureza!="todos" && d.natureza!=natureza) continue

dadosFiltrados.push(d)

total++

if(d.natureza=="Cargo Vago") cargo++
if(d.natureza=="Substituição") sub++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0
contagem[chave]++

if(!ranking[d.escola]) ranking[d.escola]=0
ranking[d.escola]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.querySelector("#tabela tbody")

tabela.innerHTML=""

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`
<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>
`

}

let rankingTabela=document.getElementById("ranking")

rankingTabela.innerHTML="<tr><th>Escola</th><th>Total</th></tr>"

let ordem=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

for(let r of ordem.slice(0,10)){

rankingTabela.innerHTML+=`
<tr>
<td>${r[0]}</td>
<td>${r[1]}</td>
</tr>
`

}

}

function exportar(){

let ws=XLSX.utils.json_to_sheet(dadosFiltrados)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"resultado")

XLSX.writeFile(wb,"vagas_filtradas.xlsx")

}

document.getElementById("busca").oninput=filtrar
document.getElementById("turno").onchange=filtrar
document.getElementById("natureza").onchange=filtrar

carregar()

</script>

</body>

</html>

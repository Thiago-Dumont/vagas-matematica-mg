<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel de Vagas Matemática</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f3c88;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-bottom:20px;
}

.card{
flex:1;
min-width:200px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card h3{
margin:0;
font-size:28px;
}

.badge{
color:white;
padding:4px 10px;
border-radius:8px;
font-size:12px;
font-weight:bold;
}

.cargo{
background:#27ae60;
}

.substituicao{
background:#e67e22;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#eee;
}

#map{
height:450px;
margin-top:30px;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>Painel de Vagas de Matemática</h1>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h3 id="total">0</h3>
<p>Total de vagas</p>
</div>

<div class="card">
<h3 id="cargo">0</h3>
<p>Cargo Vago</p>
</div>

<div class="card">
<h3 id="sub">0</h3>
<p>Substituição</p>
</div>

</div>

<table id="tabela">

<tr>
<th>Escola</th>
<th>Turno</th>
<th>Natureza</th>
<th>Vagas</th>
</tr>

</table>

<h2>Mapa das escolas</h2>

<div id="map"></div>

</div>

<script>

let dados=[]
let coordenadas={}
let mapa

async function carregar(){

let respExcel=await fetch("vagas_metropolitanaC_2026_corrigido (1).xlsx")

let dadosExcel=await respExcel.arrayBuffer()

let workbook=XLSX.read(dadosExcel)

let sheet=workbook.Sheets[workbook.SheetNames[0]]

let linhas=XLSX.utils.sheet_to_json(sheet,{header:1})

for(let i=1;i<linhas.length;i++){

dados.push({
escola:linhas[i][1],
turno:linhas[i][3],
natureza:linhas[i][4]
})

}

let respCoord=await fetch("escolas.json")

let lista=await respCoord.json()

for(let e of lista){

coordenadas[e.nome]=[e.lat,e.lon]

}

gerar()

}

function gerar(){

let total=0
let cargo=0
let sub=0
let contagem={}

for(let d of dados){

total++

if(d.natureza=="Cargo Vago") cargo++
if(d.natureza=="Substituição") sub++

let chave=d.escola+"|"+d.turno+"|"+d.natureza

if(!contagem[chave]) contagem[chave]=0

contagem[chave]++

}

document.getElementById("total").innerText=total
document.getElementById("cargo").innerText=cargo
document.getElementById("sub").innerText=sub

let tabela=document.getElementById("tabela")

tabela.innerHTML="<tr><th>Escola</th><th>Turno</th><th>Natureza</th><th>Vagas</th></tr>"

for(let chave in contagem){

let p=chave.split("|")

let classe=p[2]=="Cargo Vago"?"cargo":"substituicao"

tabela.innerHTML+=`

<tr>
<td>${p[0]}</td>
<td>${p[1]}</td>
<td><span class="badge ${classe}">${p[2]}</span></td>
<td>${contagem[chave]}</td>
</tr>

`

}

criarMapa(contagem)

}

function criarMapa(contagem){

mapa=L.map('map').setView([-19.92,-44.05],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa)

for(let chave in contagem){

let p=chave.split("|")

let escola=p[0]

if(coordenadas[escola]){

let c=coordenadas[escola]

L.marker(c).addTo(mapa)
.bindPopup("<b>"+escola+"</b><br>"+contagem[chave]+" vagas")

}

}

}

carregar()

</script>

</body>

</html>
